<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f1724">
    <title>Flappy Bird Mini App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Telegram Mini App</p>
            <h1>Sky Hopper</h1>
          </div>
          <div class="status-chip" id="playerName">Guest pilot</div>
        </header>

        <section class="stats" aria-label="Game stats">
          <article class="stat-card">
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </article>
          <article class="stat-card">
            <span>Best</span>
            <strong id="bestValue">0</strong>
          </article>
        </section>

        <section class="game-shell">
          <canvas id="game" width="420" height="720" aria-label="Flappy Bird style game"></canvas>

          <div class="overlay" id="overlay">
            <p class="overlay-kicker" id="statusLabel">Tap to launch</p>
            <h2 id="overlayTitle">Sky Hopper</h2>
            <p id="overlayText">
              Tap the screen or press Space to fly. Stay between the pipes and send your score back to Telegram.
            </p>

            <div class="actions">
              <button type="button" id="primaryButton">Start run</button>
              <button type="button" class="secondary" id="shareButton" hidden>Send score</button>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
